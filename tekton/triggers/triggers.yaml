---
# TriggerBinding — TEST branch
# Extracts the branch name and repo URL from the GitHub webhook payload
apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerBinding
metadata:
  name: budgetapp-test-binding
  namespace: cicd
spec:
  params:
    - name: git-revision
      value: $(body.ref)
    - name: git-url
      value: $(body.repository.clone_url)

---
# TriggerBinding — PROD (master branch)
apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerBinding
metadata:
  name: budgetapp-prod-binding
  namespace: cicd
spec:
  params:
    - name: git-revision
      value: $(body.ref)
    - name: git-url
      value: $(body.repository.clone_url)

---
# TriggerTemplate — TEST
# Creates a PipelineRun when a push to test branch is detected
apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerTemplate
metadata:
  name: budgetapp-test-template
  namespace: cicd
spec:
  params:
    - name: git-revision
    - name: git-url
  resourcetemplates:
    - apiVersion: tekton.dev/v1
      kind: PipelineRun
      metadata:
        generateName: budgetapp-test-run-
        namespace: cicd
      spec:
        pipelineRef:
          name: budgetapp-pipeline
        params:
          - name: git-url
            value: $(tt.params.git-url)
          - name: git-revision
            value: test
          - name: image-tag
            value: test
          - name: deploy-namespace
            value: test
        workspaces:
          - name: source
            persistentVolumeClaim:
              claimName: budgetapp-source-pvc
          - name: gitops
            persistentVolumeClaim:
              claimName: budgetapp-gitops-pvc
          - name: docker-credentials
            secret:
              secretName: quay-secret

---
# TriggerTemplate — PROD (master)
apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerTemplate
metadata:
  name: budgetapp-prod-template
  namespace: cicd
spec:
  params:
    - name: git-revision
    - name: git-url
  resourcetemplates:
    - apiVersion: tekton.dev/v1
      kind: PipelineRun
      metadata:
        generateName: budgetapp-prod-run-
        namespace: cicd
      spec:
        pipelineRef:
          name: budgetapp-pipeline
        params:
          - name: git-url
            value: $(tt.params.git-url)
          - name: git-revision
            value: master
          - name: image-tag
            value: prod
          - name: deploy-namespace
            value: prod
        workspaces:
          - name: source
            persistentVolumeClaim:
              claimName: budgetapp-source-pvc
          - name: gitops
            persistentVolumeClaim:
              claimName: budgetapp-gitops-pvc
          - name: docker-credentials
            secret:
              secretName: quay-secret

---
# EventListener — single entry point for all GitHub webhooks
# Checks the branch name and routes to the correct TriggerTemplate
apiVersion: triggers.tekton.dev/v1beta1
kind: EventListener
metadata:
  name: budgetapp-listener
  namespace: cicd
spec:
  serviceAccountName: pipeline
  triggers:
    # Route pushes to the test branch
    - name: test-branch-trigger
      interceptors:
        - ref:
            name: github
          params:
            - name: secretRef
              value:
                secretName: github-webhook-secret
                secretKey: secret
            - name: eventTypes
              value: ["push"]
        # Only trigger if the push is to the test branch
        - ref:
            name: cel
          params:
            - name: filter
              value: "body.ref == 'refs/heads/test'"
      bindings:
        - ref: budgetapp-test-binding
      template:
        ref: budgetapp-test-template

    # Route pushes to the master branch (merged PRs)
    - name: master-branch-trigger
      interceptors:
        - ref:
            name: github
          params:
            - name: secretRef
              value:
                secretName: github-webhook-secret
                secretKey: secret
            - name: eventTypes
              value: ["push"]
        # Only trigger if the push is to the master branch
        - ref:
            name: cel
          params:
            - name: filter
              value: "body.ref == 'refs/heads/master'"
      bindings:
        - ref: budgetapp-prod-binding
      template:
        ref: budgetapp-prod-template
