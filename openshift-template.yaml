apiVersion: template.openshift.io/v1
kind: Template
metadata:
  name: budgetapp
  annotations:
    description: "Budget tracking Flask app with persistent JSON data storage"

# ── Parameters ────────────────────────────────────────────────────────────────
parameters:
  - name: NAMESPACE
    description: "The OpenShift namespace/project to deploy into"
    required: true
  - name: IMAGE_TAG
    description: "Full image reference, e.g. image-registry.../namespace/budgetapp:latest"
    required: true
  - name: SECRET_KEY
    description: "Flask secret key — change this to a random string in production"
    generate: expression
    from: "[a-zA-Z0-9]{32}"

objects:

# ── 1. Secret — Flask config ──────────────────────────────────────────────────
# FIX: credentials/secrets must never be in plain YAML. Use a Secret object.
- apiVersion: v1
  kind: Secret
  metadata:
    name: budgetapp-secret
    namespace: ${NAMESPACE}
  type: Opaque
  stringData:
    SECRET_KEY: ${SECRET_KEY}

# ── 2. PersistentVolumeClaim — app data directory ─────────────────────────────
# FIX: The app stores all data as JSON files under /app/data.
# Without a PVC every pod restart wipes all transactions, budgets, and settings.
- apiVersion: v1
  kind: PersistentVolumeClaim
  metadata:
    name: budgetapp-data
    namespace: ${NAMESPACE}
  spec:
    accessModes:
      - ReadWriteOnce
    resources:
      requests:
        storage: 1Gi

# ── 3. Deployment — the Flask application ─────────────────────────────────────
- apiVersion: apps/v1
  kind: Deployment
  metadata:
    name: budgetapp
    namespace: ${NAMESPACE}
    labels:
      app: budgetapp
  spec:
    replicas: 1
    selector:
      matchLabels:
        app: budgetapp
    template:
      metadata:
        labels:
          app: budgetapp
      spec:
        containers:
          - name: budgetapp
            image: ${IMAGE_TAG}
            ports:
              - containerPort: 8080
            env:
              - name: SECRET_KEY
                valueFrom:
                  secretKeyRef:
                    name: budgetapp-secret
                    key: SECRET_KEY
            volumeMounts:
              # Mount the PVC at /app/data so JSON files survive pod restarts.
              - name: app-data
                mountPath: /app/data
            resources:
              requests:
                memory: "128Mi"
                cpu: "100m"
              limits:
                memory: "512Mi"
                cpu: "500m"
            readinessProbe:
              httpGet:
                path: /
                port: 8080
              initialDelaySeconds: 10
              periodSeconds: 5
            livenessProbe:
              httpGet:
                path: /
                port: 8080
              initialDelaySeconds: 30
              periodSeconds: 10
        volumes:
          - name: app-data
            persistentVolumeClaim:
              claimName: budgetapp-data

# ── 4. Service — internal cluster networking ──────────────────────────────────
# FIX: the original template had no Service, so the Route had nothing to route to.
- apiVersion: v1
  kind: Service
  metadata:
    name: budgetapp
    namespace: ${NAMESPACE}
    labels:
      app: budgetapp
  spec:
    selector:
      app: budgetapp
    ports:
      - name: http
        port: 8080
        targetPort: 8080

# ── 5. Route — external access ────────────────────────────────────────────────
# FIX: the original template had no Route, making the app unreachable externally.
- apiVersion: route.openshift.io/v1
  kind: Route
  metadata:
    name: budgetapp
    namespace: ${NAMESPACE}
    labels:
      app: budgetapp
  spec:
    to:
      kind: Service
      name: budgetapp
    port:
      targetPort: http
    tls:
      termination: edge
      insecureEdgeTerminationPolicy: Redirect

# ── NOTE: Database removed ────────────────────────────────────────────────────
# The original template deployed a PostgreSQL instance but the app does NOT
# use a database — it reads and writes plain JSON files.
# The PostgreSQL Deployment and its PVC have been removed to avoid
# spinning up unused resources.
# If you later migrate main.py to use PostgreSQL, re-add:
#   - A Secret for POSTGRESQL_USER / POSTGRESQL_PASSWORD / POSTGRESQL_DATABASE
#   - A PVC for /var/lib/pgsql/data
#   - A Deployment for registry.redhat.io/rhel9/postgresql-15
#   - A Service exposing port 5432
#   - Env vars DB_HOST / DB_USER / DB_PASSWORD / DB_NAME on the app container