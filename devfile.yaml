schemaVersion: 2.2.0
metadata:
  name: budgetapp-dev-env
  # This attribute tells the Operator to mount the secret as Git credentials
  attributes:
    project.scm.server: github.com
    project.scm.secret: github-token
components:
  - name: python-runtime
    container:
      image: quay.io/devfile/universal-developer-image:latest
      memoryLimit: 2Gi
      mountSources: true
      endpoints:
        - name: flask-app
          targetPort: 5000
          exposure: public
          protocol: http
      env:
        - name: DB_HOST
          value: localhost
        - name: DB_USER
          value: root
        - name: DB_PASSWORD
          value: rootpassword
        - name: DB_NAME
          value: budget_db

  - name: mysql-db
    container:
      image: public.ecr.aws/bitnami/mysql:8.0
      memoryLimit: 512Mi
      env:
        - name: MYSQL_ROOT_PASSWORD
          value: rootpassword
        - name: MYSQL_DATABASE
          value: budget_db
        - name: MYSQL_AUTHENTICATION_PLUGIN
          value: mysql_native_password

commands:
  - id: auto-setup
    exec:
      component: python-runtime
      # We pull the identity inside the script to avoid schema validation issues
      commandLine: |
        export GIT_AUTHOR_NAME=$(oc get secret github-token -o jsonpath='{.data.user\.name}' | base64 -d)
        export GIT_AUTHOR_EMAIL=$(oc get secret github-token -o jsonpath='{.data.user\.email}' | base64 -d)
        git config --global user.name "$GIT_AUTHOR_NAME"
        git config --global user.email "$GIT_AUTHOR_EMAIL"
        git config --global credential.helper 'store'
        echo "https://dlabreu:$(oc get secret github-token -o jsonpath='{.data.password}' | base64 -d)@github.com" > ~/.git-credentials
        (sleep 20 && \
        pip install mysql-connector-python && \
        pip install -r Openshift-App/requirements.txt && \
        python3 -c "import mysql.connector; conn = mysql.connector.connect(host='localhost', user='root', password='rootpassword'); cursor = conn.connector.connect(host='localhost', user='root', password='rootpassword'); cursor.execute('CREATE DATABASE IF NOT EXISTS budget_db'); conn.close(); print('Ready!')") & \
        echo "Identity and Auth configured from Secret"
      workingDir: ${PROJECT_SOURCE}

events:
  postStart:
    - auto-setup
