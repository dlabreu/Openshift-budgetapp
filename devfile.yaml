schemaVersion: 2.2.0
metadata:
  name: budgetapp-dev-env
components:
  - name: python-runtime
    container:
      image: quay.io/devfile/universal-developer-image:latest
      memoryLimit: 2Gi
      mountSources: true
      endpoints:
        - name: flask-app
          targetPort: 5000
          exposure: public
          protocol: http
      env:
        - name: DB_HOST
          value: localhost
        - name: DB_USER
          value: root
        - name: DB_PASSWORD
          value: rootpassword
        - name: DB_NAME
          value: budget_db
  - name: mysql-db
    container:
      image: registry.redhat.io/rhel8/mysql-80:latest
      memoryLimit: 512Mi
      env:
        - name: MYSQL_ROOT_PASSWORD
          value: rootpassword
        - name: MYSQL_DATABASE
          value: budget_db

commands:
  - id: auto-setup
    exec:
      component: python-runtime
      # We wrap everything in a subshell that always returns success (exit 0)
      commandLine: |
        (sleep 15 && \
        pip install mysql-connector-python && \
        pip install -r Openshift-App/requirements.txt && \
        python3 -c "import mysql.connector; conn = mysql.connector.connect(host='localhost', user='root', password='rootpassword'); cursor = conn.cursor(); cursor.execute('CREATE DATABASE IF NOT EXISTS budget_db'); conn.close(); print('Ready!')") & echo "Setup started in background"
      workingDir: ${PROJECT_SOURCE}

events:
  postStart:
    - auto-setup
