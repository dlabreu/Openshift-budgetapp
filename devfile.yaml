schemaVersion: 2.2.0
metadata:
  name: budgetapp-dev-env
  # This attribute tells the Operator to look for our secret and mount it
  attributes:
    project.scm.server: github.com
    project.scm.secret: github-token
components:
  - name: python-runtime
    container:
      image: quay.io/devfile/universal-developer-image:latest
      memoryLimit: 2Gi
      mountSources: true
      endpoints:
        - name: flask-app
          targetPort: 5000
          exposure: public
          protocol: http
      env:
        - name: DB_HOST
          value: localhost
        - name: DB_USER
          value: root
        - name: DB_PASSWORD
          value: rootpassword
        - name: DB_NAME
          value: budget_db

  - name: mysql-db
    container:
      image: public.ecr.aws/bitnami/mysql:8.0
      memoryLimit: 512Mi
      env:
        - name: MYSQL_ROOT_PASSWORD
          value: rootpassword
        - name: MYSQL_DATABASE
          value: budget_db
        - name: MYSQL_AUTHENTICATION_PLUGIN
          value: mysql_native_password

commands:
  - id: auto-setup
    exec:
      component: python-runtime
      commandLine: |
        (sleep 20 && \
        pip install mysql-connector-python && \
        pip install -r Openshift-App/requirements.txt && \
        python3 -c "import mysql.connector; conn = mysql.connector.connect(host='localhost', user='root', password='rootpassword'); cursor = conn.cursor(); cursor.execute('CREATE DATABASE IF NOT EXISTS budget_db'); conn.close(); print('Ready!')") & \
        git config --global credential.helper store && \
        echo "Setup started"
      workingDir: ${PROJECT_SOURCE}

events:
  postStart:
    - auto-setup
