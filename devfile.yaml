schemaVersion: 2.2.0
metadata:
  name: budgetapp-dev-env
components:
  - name: python-runtime
    container:
      image: quay.io/devfile/universal-developer-image:latest
      memoryLimit: 2Gi
      mountSources: true
      endpoints:
        - name: flask-app
          targetPort: 5000
          exposure: public
          protocol: http
      env:
        - name: DB_HOST
          value: localhost
        - name: DB_USER
          value: root
        - name: DB_PASSWORD
          value: rootpassword
        - name: DB_NAME
          value: budget_db
  - name: mysql-db
    container:
      image: registry.redhat.io/rhel8/mysql-80:latest
      memoryLimit: 512Mi
      env:
        - name: MYSQL_ROOT_PASSWORD
          value: rootpassword
        - name: MYSQL_DATABASE
          value: budget_db

commands:
  - id: install-deps
    exec:
      component: python-runtime
      # We use '|| true' so the workspace doesn't crash if a pip install fails
      commandLine: "pip install mysql-connector-python && pip install -r Openshift-App/requirements.txt || true"
      workingDir: ${PROJECT_SOURCE}

  - id: init-db
    exec:
      component: python-runtime
      # Added a sleep to give MySQL 10 seconds to start up first
      commandLine: |
        sleep 10 && \
        python3 -c "import mysql.connector; conn = mysql.connector.connect(host='localhost', user='root', password='rootpassword'); cursor = conn.cursor(); cursor.execute('CREATE DATABASE IF NOT EXISTS budget_db'); conn.close(); print('DB Ready!')" || true

events:
  postStart:
    - install-deps
    - init-db
