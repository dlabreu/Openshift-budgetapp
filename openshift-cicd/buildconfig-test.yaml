---
# BuildConfig — TEST branch
# Triggered by GitHub webhook on push to test.
# Builds the image and pushes to:
#   - quay.io/dabreu/budgetapp:test  (external, for inspection)
#   - internal ImageStream as :test  (triggers DeploymentConfig in admin-devspaces)
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: budgetapp-test
  namespace: admin-devspaces
  labels:
    app: budgetapp
    branch: test
spec:
  source:
    type: Git
    git:
      uri: https://github.com/dlabreu/Openshift-budgetapp.git
      ref: test
    contextDir: /

  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Containerfile

  output:
    to:
      kind: DockerImage
      name: quay.io/dabreu/budgetapp:test
    pushSecret:
      name: quay-push-secret

  # After pushing to quay, also update the internal ImageStream
  # so the DeploymentConfig auto-triggers
  postCommit: {}

  triggers:
    - type: GitHub
      github:
        secret: budgetapp-webhook-test
    - type: ImageChange
