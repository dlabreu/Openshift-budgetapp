---
# Webhook secret for the TEST BuildConfig trigger.
# OpenShift uses this to validate that the webhook call is from GitHub.
apiVersion: v1
kind: Secret
metadata:
  name: budgetapp-webhook-test
  namespace: admin-devspaces
type: Opaque
stringData:
  WebHookSecretKey: budgetapp-test-webhook-secret-change-me
---
# Webhook secret for the PROD (main) BuildConfig trigger.
apiVersion: v1
kind: Secret
metadata:
  name: budgetapp-webhook-prod
  namespace: admin-devspaces
type: Opaque
stringData:
  WebHookSecretKey: budgetapp-prod-webhook-secret-change-me
