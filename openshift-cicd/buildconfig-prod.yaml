---
# BuildConfig — MAIN branch (prod)
# Triggered by GitHub webhook when a PR is merged to main.
# Builds the image and pushes to:
#   - quay.io/dabreu/budgetapp:latest  (external, prod image)
#   - internal ImageStream as :latest  (triggers DeploymentConfig in prod)
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: budgetapp-prod
  namespace: admin-devspaces
  labels:
    app: budgetapp
    branch: main
spec:
  source:
    type: Git
    git:
      uri: https://github.com/dlabreu/Openshift-budgetapp.git
      ref: main
    contextDir: /

  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Containerfile

  output:
    to:
      kind: DockerImage
      name: quay.io/dabreu/budgetapp:latest
    pushSecret:
      name: quay-push-secret

  triggers:
    - type: GitHub
      github:
        secret: budgetapp-webhook-prod
    - type: ImageChange
