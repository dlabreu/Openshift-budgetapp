---
# PersistentVolumeClaim — PROD data storage
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: budgetapp-data
  namespace: prod
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
# Secret — Flask secret key for prod
apiVersion: v1
kind: Secret
metadata:
  name: budgetapp-secret
  namespace: prod
type: Opaque
stringData:
  SECRET_KEY: "change-this-to-a-real-random-string-for-prod"
---
# Deployment — PROD namespace
# Pulls from quay.io/dabreu/budgetapp:latest
# Use a standard Deployment (not DeploymentConfig) — compatible with OCP 4.14+
apiVersion: apps/v1
kind: Deployment
metadata:
  name: budgetapp
  namespace: prod
  labels:
    app: budgetapp
  annotations:
    # This annotation is used by the rollout trigger script to detect new images
    image.openshift.io/triggers: >
      [{"from":{"kind":"DockerImage","name":"quay.io/dabreu/budgetapp:latest"},
        "fieldPath":"spec.template.spec.containers[?(@.name==\"budgetapp\")].image"}]
spec:
  replicas: 1
  selector:
    matchLabels:
      app: budgetapp
  template:
    metadata:
      labels:
        app: budgetapp
    spec:
      # Use the quay pull secret so the pod can pull the image
      imagePullSecrets:
        - name: quay-pull-secret
      containers:
        - name: budgetapp
          image: quay.io/dabreu/budgetapp:latest
          imagePullPolicy: Always   # Always pull so new :latest is picked up
          ports:
            - containerPort: 8080
          env:
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: budgetapp-secret
                  key: SECRET_KEY
          volumeMounts:
            - name: app-data
              mountPath: /app/data
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: app-data
          persistentVolumeClaim:
            claimName: budgetapp-data
---
# Service
apiVersion: v1
kind: Service
metadata:
  name: budgetapp
  namespace: prod
  labels:
    app: budgetapp
spec:
  selector:
    app: budgetapp
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
# Route
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: budgetapp
  namespace: prod
  labels:
    app: budgetapp
spec:
  to:
    kind: Service
    name: budgetapp
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
